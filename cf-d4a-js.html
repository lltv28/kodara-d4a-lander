<script type="text/javascript" src="https://app.iclosed.io/assets/widget.js" async></script>
<script>
var KDR=document.getElementById('kdr-lp');if(KDR)KDR.classList.add('js');
const REDUCE_MOTION=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
/* size the embedded AI demo iframe to its reported content height */
window.addEventListener('message',e=>{if(e.data&&e.data.fdAppHeight){const fr=document.getElementById('fdframe');if(fr)fr.style.height=e.data.fdAppHeight+'px';}});

/* reveal */
const ro=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');ro.unobserve(e.target);}})},{threshold:.12});
function bindReveals(){document.querySelectorAll('.rv-g').forEach(g=>{[...g.children].forEach((c,i)=>c.style.setProperty('--i',Math.min(i,6)));});document.querySelectorAll('.rv:not(.in),.rv-g:not(.in)').forEach(el=>ro.observe(el));}
bindReveals();

/* follow-up nudge stack */
const N_TODAY=new Date();
const NGLYPH={
  messages:'<svg viewBox="0 0 24 24"><rect width="24" height="24" fill="url(#ic-msg)"/><path d="M12 5.2c-4.3 0-7.8 2.7-7.8 6.1 0 1.75.94 3.36 2.46 4.48-.18 1.07-.7 2.05-1.48 2.82 1.39 0 2.74-.49 3.8-1.3.95.31 1.97.49 3.02.49 4.3 0 7.8-2.7 7.8-6.1S16.3 5.2 12 5.2z" fill="#fff"/></svg>',
  mail:'<svg viewBox="0 0 24 24"><rect width="24" height="24" fill="url(#ic-mail)"/><g fill="none" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"><rect x="4.3" y="7.2" width="15.4" height="9.6" rx="2.4"/><path d="M4.8 8.3 12 12.8l7.2-4.5"/></g></svg>',
  calendar:'<svg viewBox="0 0 24 24"><rect width="24" height="24" fill="#fff"/><text x="12" y="8" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="4.6" font-weight="700" letter-spacing=".2" fill="#FF3B30">'+N_TODAY.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase()+'</text><text x="12" y="19.6" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="500" fill="#1d1d1f">'+N_TODAY.getDate()+'</text></svg>',
  whatsapp:'<svg viewBox="0 0 24 24"><rect width="24" height="24" fill="url(#ic-wa)"/><path fill="#fff" fill-rule="evenodd" d="M12.04 4.6c-4.1 0-7.43 3.32-7.43 7.42 0 1.3.34 2.58 1 3.71L4.6 19.4l3.78-.99a7.4 7.4 0 0 0 3.55.9h.003c4.1 0 7.43-3.33 7.43-7.43a7.38 7.38 0 0 0-2.17-5.25 7.38 7.38 0 0 0-5.25-2.18zm4.34 10.6c-.18.52-1.06.99-1.49 1.05-.38.06-.86.08-1.39-.09-.32-.1-.74-.24-1.27-.47-2.24-.97-3.71-3.23-3.82-3.38-.11-.15-.91-1.22-.91-2.32s.58-1.65.79-1.87c.21-.23.46-.29.61-.29.15 0 .31 0 .44.01.14.01.33-.05.51.39.19.46.64 1.6.7 1.72.06.11.09.25.02.4-.07.15-.11.25-.22.38-.11.13-.24.29-.34.39-.11.11-.23.24-.1.47.13.23.59.97 1.27 1.57.87.78 1.6 1.02 1.83 1.13.23.11.36.1.49-.06.13-.15.57-.66.72-.89.15-.23.3-.19.51-.11.21.08 1.33.63 1.56.74.23.11.38.17.43.27.06.1.06.55-.12 1.07z"/></svg>'
};
/* iOS notification anatomy: title = sender (the icon already says the channel);
   mail gets subject + one-line gray preview; calendar title = the event.
   No fixed `time` — cards insert as "now" and age each tick. `group` renders
   the iOS stacked-edges treatment (a burst of follow-ups collapsed by app). */
const NUDGES=[
  {kind:'messages',title:'AI Coach',msg:'Saw you grabbed the starter plan. Want me to set up day 1 around your schedule?'},
  {kind:'whatsapp',title:'AI Coach',msg:"Hey! Saw your message come through, happy to help. What would you want to fix first?"},
  {kind:'messages',title:'AI Coach',msg:"Morning! Here's today's 10-minute start, short and doable. I'll check in tonight."},
  {kind:'mail',title:'AI Coach',subject:'The one number most people get wrong',msg:'And the 2-minute fix that changes it.'},
  {kind:'messages',title:'AI Coach',group:2,msg:"Still here when you're ready. No rush."},
  {kind:'calendar',title:'Strategy Call with AI Coach',msg:'Thursday at 2:00 PM · Google Meet'},
  {kind:'mail',title:'AI Coach',subject:'Your week-one recap is ready',msg:'Small wins add up faster than you think.'},
  {kind:'messages',title:'AI Coach',msg:"Quick one: which feels easier tomorrow, morning or evening? I'll build around it."},
  {kind:'whatsapp',title:'AI Coach',group:3,msg:"No rush, I'll keep your spot. Just reply here whenever you're ready to start."}
];
const nStack=document.getElementById('nudgeStack');
let nI=2,nTimer=null;
function nMod(i){return (i%NUDGES.length+NUDGES.length)%NUDGES.length;}
function nSlot(el,s){
  el.dataset.slot=s;
  el.style.transform = `translateY(calc(var(--slot) * ${s}))`;
  el.style.zIndex = 100 - s;
  el.style.opacity = s >= 6 ? '0' : '1';
  el.style.transitionDelay = '0ms';
}
function nFmt(a){return a<1?'now':a<60?Math.round(a)+'m ago':Math.floor(a/60)+'h ago';}
function nCard(i,age){const n=NUDGES[i];const el=document.createElement('div');el.className='nudge';el.dataset.age=age||0;
  const meta='<div class="nudge-meta"><span class="nudge-title">'+n.title+'</span><span class="nudge-time">'+nFmt(age||0)+'</span></div>';
  const body=n.subject?meta+'<div class="nudge-sub">'+n.subject+'</div><div class="nudge-msg one">'+n.msg+'</div>':meta+'<div class="nudge-msg">'+n.msg+'</div>';
  el.innerHTML='<div class="nudge-ico">'+NGLYPH[n.kind]+'</div><div class="nudge-body">'+body+'</div>'+(n.group?'<i class="nudge-edge"></i>'+(n.group>2?'<i class="nudge-edge e2"></i>':''):'');
  return el;}
function nInit(){nStack.innerHTML='';let age=0;for(let s=0;s<6;s++){const el=nCard(nMod(nI-s),age);nStack.appendChild(el);age+=4+Math.random()*8;}
[...nStack.children].forEach((el,s)=>nSlot(el,s));}
function nTick(){
  const cards = [...nStack.children];
  const dt=2+Math.random()*4; /* one shared aging step so labels stay newest-on-top */
  cards.forEach(el=>{
    el.dataset.age=+el.dataset.age+dt;
    const t=el.querySelector('.nudge-time');if(t)t.textContent=nFmt(+el.dataset.age);
    const s=(+el.dataset.slot||0)+1;
    nSlot(el,s);
    if(s>=6){el.style.opacity='0';setTimeout(()=>el.remove(),560);}
  });
  nI=nMod(nI+1);
  const el=nCard(nI,0);
  el.style.transition='none';
  el.style.opacity='0';
  el.style.transform='translateY(-22px)';
  nStack.insertBefore(el, nStack.firstChild);
  void el.offsetWidth;
  el.style.transition='';
  nSlot(el,0);
}
/* varied cadence — lock screens breathe, they don't tick like a metronome */
function nStart(){if(REDUCE_MOTION||nTimer)return;const next=()=>{nTimer=setTimeout(()=>{nTick();next();},4000+Math.random()*5000);};next();}
function nStop(){if(nTimer){clearTimeout(nTimer);nTimer=null;}}
/* live lock-screen clock + date (HTML values are the no-JS fallback) */
(function(){const dateEl=document.querySelector('.ios-date'),clkEl=document.querySelector('.ios-clock');
  function set(){const n=new Date();if(dateEl)dateEl.textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});if(clkEl)clkEl.textContent=(n.getHours()%12||12)+':'+String(n.getMinutes()).padStart(2,'0');}
  set();setInterval(set,30000);})();
nInit();
let nKicked=false;
new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){if(!nKicked&&!REDUCE_MOTION){nKicked=true;setTimeout(nTick,350);}nStart();}else nStop();})},{threshold:.3}).observe(nStack);

/* smooth-scroll the CTAs to the on-page scheduler (scoped; no global html rule needed) */
document.querySelectorAll('#kdr-lp a[href="#book"]').forEach(function(a){a.addEventListener('click',function(ev){ev.preventDefault();var t=document.getElementById('book');if(t)t.scrollIntoView({behavior:'smooth',block:'start'});});});
</script>
